<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vergunningcheck – Werkzaamheden</title>
  <link rel="stylesheet" href="https://cdn.dso-toolkit.nl/dso-toolkit/master/dist/dso.css" />
  <link rel="stylesheet" href="prototype.css" />
  <script type="module"
    src="https://cdn.dso-toolkit.nl/@dso-toolkit/core/master/dist/dso-toolkit/dso-toolkit.esm.js"></script>
  
</head>

<body>



  <!-- Main -->
  <div class="container">
    <!-- Header -->
    <dso-header id="main-header" compact="auto" auth-status="loggedOut" login-url="#login" logout-url="#logout"
      user-profile-url="#profiel" user-profile-name="J.A. Jansen" user-home-url="#myhome"
      mainMenu="HeaderMenuItem[Home]">
      <div slot="logo"><dso-logo></dso-logo></div>
    </dso-header>
    <script>
      document.getElementById('main-header').mainMenu = [
        { label: 'Home', url: 'index.html' },
        { label: 'Vergunningcheck', url: 'Boomkappen.html', active: true },
        { label: 'Aanvragen', url: 'aanvragen.html' },
        { label: 'Regels op de kaart', url: 'regels.html' },
        { label: 'Maatregelen op maat', url: 'maatregelen.html' },
      ];
    </script>
    <div id="wizard">
      <div class="dso-app-heading">
        <h1>Vergunningcheck</h1>
        <h2 id="step-indicator" class="dso-steps-indicator">2. Kies werkzaamheden - overzicht<span class="dso-step">Stap
            2/4</span></h2>
      </div>
      <form class="form-horizontal">
        <div class="row form-group">
          <div class="col-xs-12">
            <div id="mijn-winkelmandje">
            </div>
          </div>
        </div>

        <div class="row form-group">
          <div class="col-xs-12"><button id="werkzaamheden-add-button" class="btn dso-secondary "
              type="button"><dso-icon icon="plus" class="hydrated"></dso-icon><span><span>Werkzaamheid
                  toevoegen</span></span></button></div>
        </div>
        <div class="dso-form-buttons">
          <div class="dso-aside"><a id="back-button-bottom" href="extra-werkzaamheden.html" class="btn dso-tertiary "
              data-testid="back-button-bottom"><dso-icon class="hydrated"
                icon="chevron-left"></dso-icon><span>Vorige</span></a></div>
          <button id="save-check-from-wizard" class="btn dso-secondary " type="button"><dso-icon icon="user-solid"
              class="hydrated"></dso-icon><span>Vergunningcheck opslaan</span></button><button id="next-button-bottom"
            class="btn dso-primary " type="button" data-testid="next-button-bottom" onclick="gaNaarVragen()"><span>Volgende stap</span><dso-icon
              icon="chevron-right" class="hydrated"></dso-icon></button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // De JSON data uit je bestand


    let geselecteerdeWerkzaamheden = new Set();
    let gekozenItems = new Set();
    // 1. Selecteer de elementen




    renderWinkelmandje();


    /**
     * Verwijdert een item specifiek vanuit het mandje
     */
    function verwijderUitMandje(naam) {
      geselecteerdeWerkzaamheden.delete(naam);
      renderWinkelmandje();
    }


    function renderWinkelmandje() {
      const container = document.getElementById('mijn-winkelmandje');
      if (!container) return;

      // Zet de Set om naar een Array om er doorheen te kunnen lopen
      const items = Array.from(gekozenItems);

      // Lege status
      if (items.length === 0) {
        container.innerHTML = `
            <h2>Mijn werkzaamheden</h2>
            <div class="dso-shopping-cart">
                <div class="dso-contents">
                    <h3 class="dso-empty">U heeft nog geen werkzaamheden gekozen</h3>
                </div>
            </div>
        `;
        return;
      }

      // Gevulde status
      const lijstHtml = items.map(naam => `
        <li>
            ${naam}
             <button onclick="verwijderUitMandje('${naam}')" type="button" class="dso-delete">
               <span class="sr-only">Verwijder ${naam} - Melding</span><dso-icon icon="trash"></dso-icon>
            </button>
        </li>
    `).join('');

      container.innerHTML = `
        <h2>Mijn werkzaamheden</h2>
        <div class="dso-shopping-cart">
          <div class="dso-contents">
               <span class="dso-status">U heeft ${items.length} werkzaamheden gekozen</span>
               <ul class="dso-items">${lijstHtml}</ul>
            </div>
        </div>
    `;
    }

    function verwijderUitMandje(naam) {
      // 1. Verwijder uit de data én de sessie
      gekozenItems.delete(naam);
      geselecteerdeWerkzaamheden.delete(naam);

      try {
        const state = JSON.parse(sessionStorage.getItem('vcheck_state') || '{}');
        state.werkzaamheden = Array.from(gekozenItems);
        sessionStorage.setItem('vcheck_state', JSON.stringify(state));
      } catch (e) { }

      // 2. Update het mandje visueel
      renderWinkelmandje();

      // 3. Update de list-buttons in de resultatenlijst (vinkje uit)
      const buttons = document.querySelectorAll('dso-list-button');
      buttons.forEach(btn => {
        if (btn.getAttribute('label') === naam) {
          btn.removeAttribute('checked');
        }
      });
    }



  </script>

  <script>
    // === SESSIONSTORAGE INTEGRATIE ===

    // Herstel eerder opgeslagen werkzaamheden bij laden
    (function herstelSessie() {
      try {
        const state = JSON.parse(sessionStorage.getItem('vcheck_state') || '{}');
        if (state.werkzaamheden && Array.isArray(state.werkzaamheden)) {
          state.werkzaamheden.forEach(naam => gekozenItems.add(naam));
          renderWinkelmandje();
        }
      } catch (e) { }
    })();

    // Sla op en navigeer naar locatie-pagina
    function slaOpEnGaNaar() {
      const state = JSON.parse(sessionStorage.getItem('vcheck_state') || '{}');
      state.werkzaamheden = Array.from(gekozenItems);
      sessionStorage.setItem('vcheck_state', JSON.stringify(state));
      window.location.href = 'locatie.html';
    }
    // === In werkzaamheden.html ===

    function herstelSessieEnCheckButtons() {
      try {
        const data = sessionStorage.getItem('vcheck_state');
        if (!data) return;

        const state = JSON.parse(data);
        if (state.werkzaamheden && Array.isArray(state.werkzaamheden)) {

          state.werkzaamheden.forEach(naam => {
            // 1. Voeg toe aan de interne Set (zodat het in het mandje komt)
            gekozenItems.add(naam);

            // 2. Zoek de knop in de lijst die bij deze naam hoort en zet hem op 'checked'
            // We doen dit met een kleine vertraging om te zorgen dat de lijst al getekend is
            setTimeout(() => {
              const buttons = document.querySelectorAll('dso-list-button');
              buttons.forEach(btn => {
                if (btn.getAttribute('label') === naam) {
                  btn.setAttribute('checked', '');
                }
              });
            }, 100);
          });

          renderWinkelmandje();
        }
      } catch (e) {
        console.error("Fout bij herstellen sessie:", e);
      }
    }

    // Roep deze functie aan bij het laden van de pagina
    document.addEventListener('DOMContentLoaded', () => {
      herstelSessieEnCheckButtons();
    });

    function gaNaarVragen() {
      window.location.href = 'vragen-bomen.html';
    }

  </script>

</body>

</html>
